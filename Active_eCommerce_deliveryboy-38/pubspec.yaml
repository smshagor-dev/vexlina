name: active_flutter_delivery_app
description: This is the flutter delivery application of active ecommerce cms

# The following line prevents the package from being accidentally published to
# pub.dev using `pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
version: 1.0.0+1

environment:
  sdk: '>=3.0.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  http: ^0.13.4
  provider: ^6.0.1
  json_annotation: ^4.4.0
  logging: ^1.0.2
  connectivity_plus: ^5.0.2
  shimmer: ^3.0.0
  bordered_text: ^2.0.0
  flutter_html: ^3.0.0-alpha.5
  flutter_svg: ^2.0.5
  url_launcher: ^6.0.17
  toast: ^0.3.0
  shared_preferences: ^2.0.9
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0

  dotted_line: ^3.1.0
  timeline_list: ^0.0.3
  webview_flutter: ^4.2.0
  clipboard: ^0.1.2+8
  google_fonts: ^4.0.4
  flutter_rating_bar: ^4.0.0
  expandable: ^5.0.1
  dropdown_search: ^5.0.2
  flutter_countdown_timer: ^4.1.0

  package_info_plus: ^8.0.0
  intl_phone_number_input: ^0.7.0+2
  #intl_phone_number_input: ^0.7.0
  flutter_chat_bubble: ^2.0.0
  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.4
  carousel_slider: ^4.0.0
  cached_network_image: ^3.2.0
  timeline_tile: ^2.0.0
  shared_value: ^3.0.0
  rename: ^2.0.1
  permission_handler: ^12.0.1
  image_picker: ^1.1.2
  google_nav_bar: ^5.0.5
  one_context: ^4.1.0
  google_maps_flutter: ^2.17.0
  mobile_scanner: ^7.1.3
  pusher_channels_flutter: ^2.4.0

dependency_overrides:
  flutter_plugin_android_lifecycle: ^2.0.34
  google_maps_flutter_android: ^2.19.5
  image_picker_android: ^0.8.13+15
  libphonenumber_plugin: ^0.3.3
  path_provider_android: ^2.2.23
  shared_preferences_android: ^2.4.23
  permission_handler_android: ^13.0.1
  url_launcher_android: ^6.3.29
  webview_flutter_android: ^4.10.15
  sqflite: ^2.4.2
  sqflite_common: ^2.5.6
  win32: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.1.5
  json_serializable: ^6.1.0
  flutter_launcher_icons: ^0.13.1
  route_transitions: ^2.0.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/app_logo.png"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec


flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/
